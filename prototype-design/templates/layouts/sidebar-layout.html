<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>侧边栏布局 - B端管理系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc',
              400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1',
              800: '#075985', 900: '#0c4a6e',
            },
            neutral: {
              50: '#fafafa', 100: '#f5f5f5', 200: '#e5e5e5', 300: '#d4d4d4',
              400: '#a3a3a3', 500: '#737373', 600: '#525252', 700: '#404040',
              800: '#262626', 900: '#171717',
            },
            success: '#10b981', warning: '#f59e0b', danger: '#ef4444', info: '#3b82f6',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .sidebar { width: 240px; transition: width 0.3s; }
    .sidebar.collapsed { width: 64px; }
    .sidebar.collapsed .menu-text { display: none; }
    .sidebar.collapsed .logo-text { display: none; }
  </style>
</head>
<body class="bg-neutral-100 min-h-screen">
  <div class="flex min-h-screen">
    <aside class="sidebar bg-neutral-900 text-white flex flex-col fixed h-full z-20">
      <div class="h-16 flex items-center px-6 border-b border-neutral-800">
        <div class="w-8 h-8 bg-primary-500 rounded-lg flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
        </div>
        <span class="logo-text ml-3 text-lg font-semibold">管理系统</span>
      </div>
      
      <nav class="flex-1 py-4 overflow-y-auto">
        <div class="px-4 mb-2">
          <span class="menu-text text-xs font-medium text-neutral-500 uppercase tracking-wider">主菜单</span>
        </div>
        
        <a href="#" class="flex items-center px-6 py-3 bg-neutral-800 text-white">
          <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          <span class="menu-text ml-3">首页</span>
        </a>
        
        <a href="#" class="flex items-center px-6 py-3 text-neutral-400 hover:bg-neutral-800 hover:text-white transition-colors">
          <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
          <span class="menu-text ml-3">用户管理</span>
        </a>
        
        <a href="#" class="flex items-center px-6 py-3 text-neutral-400 hover:bg-neutral-800 hover:text-white transition-colors">
          <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
          </svg>
          <span class="menu-text ml-3">部门管理</span>
        </a>
        
        <a href="#" class="flex items-center px-6 py-3 text-neutral-400 hover:bg-neutral-800 hover:text-white transition-colors">
          <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
          </svg>
          <span class="menu-text ml-3">任务中心</span>
        </a>
        
        <div class="px-4 mt-6 mb-2">
          <span class="menu-text text-xs font-medium text-neutral-500 uppercase tracking-wider">系统设置</span>
        </div>
        
        <a href="#" class="flex items-center px-6 py-3 text-neutral-400 hover:bg-neutral-800 hover:text-white transition-colors">
          <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          <span class="menu-text ml-3">系统设置</span>
        </a>
        
        <a href="#" class="flex items-center px-6 py-3 text-neutral-400 hover:bg-neutral-800 hover:text-white transition-colors">
          <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          <span class="menu-text ml-3">操作日志</span>
        </a>
      </nav>
      
      <div class="p-4 border-t border-neutral-800">
        <div class="flex items-center">
          <div class="w-8 h-8 rounded-full bg-primary-500 flex items-center justify-center text-sm font-medium">A</div>
          <div class="menu-text ml-3">
            <p class="text-sm font-medium">Admin</p>
            <p class="text-xs text-neutral-500">管理员</p>
          </div>
        </div>
      </div>
    </aside>
    
    <div class="flex-1 ml-60">
      <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6 sticky top-0 z-10">
        <div class="flex items-center">
          <nav class="flex items-center text-sm text-neutral-500">
            <a href="#" class="hover:text-neutral-700">首页</a>
            <svg class="w-4 h-4 mx-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
            <span class="text-neutral-900">用户管理</span>
          </nav>
        </div>
        <div class="flex items-center space-x-4">
          <button class="p-2 text-neutral-400 hover:text-neutral-600 hover:bg-neutral-100 rounded-lg transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
          </button>
          <button class="p-2 text-neutral-400 hover:text-neutral-600 hover:bg-neutral-100 rounded-lg transition-colors relative">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
            </svg>
            <span class="absolute top-1 right-1 w-2 h-2 bg-danger rounded-full"></span>
          </button>
          <div class="w-px h-6 bg-neutral-200"></div>
          <div class="flex items-center space-x-3">
            <div class="w-8 h-8 rounded-full bg-primary-500 flex items-center justify-center text-white text-sm font-medium">A</div>
            <span class="text-sm font-medium text-neutral-700">Admin</span>
          </div>
        </div>
      </header>
      
      <main class="p-6">
        <div class="mb-6">
          <h1 class="text-2xl font-semibold text-neutral-900">用户管理</h1>
          <p class="text-neutral-500 mt-1">管理系统用户账号、权限等信息</p>
        </div>
        
        <div class="bg-white rounded-lg shadow">
          <div class="p-4 border-b border-neutral-200 flex items-center justify-between">
            <div class="flex items-center space-x-3">
              <input type="text" placeholder="搜索用户..." class="px-4 py-2 border border-neutral-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent w-64">
              <select class="px-4 py-2 border border-neutral-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500">
                <option>全部状态</option>
                <option>启用</option>
                <option>禁用</option>
              </select>
            </div>
            <button class="px-4 py-2 bg-primary-600 text-white rounded-lg text-sm font-medium hover:bg-primary-700 flex items-center transition-colors">
              <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
              </svg>
              新增用户
            </button>
          </div>
          
          <table class="min-w-full divide-y divide-neutral-200">
            <thead class="bg-neutral-50">
              <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-neutral-500 uppercase tracking-wider">用户</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-neutral-500 uppercase tracking-wider">部门</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-neutral-500 uppercase tracking-wider">角色</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-neutral-500 uppercase tracking-wider">状态</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-neutral-500 uppercase tracking-wider">创建时间</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-neutral-500 uppercase tracking-wider">操作</th>
              </tr>
            </thead>
            <tbody class="bg-white divide-y divide-neutral-200">
              <tr class="hover:bg-neutral-50 transition-colors">
                <td class="px-6 py-4 whitespace-nowrap">
                  <div class="flex items-center">
                    <div class="w-10 h-10 rounded-full bg-primary-100 flex items-center justify-center text-primary-600 font-medium">张</div>
                    <div class="ml-4">
                      <div class="text-sm font-medium text-neutral-900">张三</div>
                      <div class="text-sm text-neutral-500">zhangsan@example.com</div>
                    </div>
                  </div>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-neutral-600">技术部</td>
                <td class="px-6 py-4 whitespace-nowrap">
                  <span class="px-2 py-1 text-xs font-medium bg-primary-100 text-primary-700 rounded">管理员</span>
                </td>
                <td class="px-6 py-4 whitespace-nowrap">
                  <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">启用</span>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-neutral-500">2024-01-15</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm">
                  <a href="#" class="text-primary-600 hover:text-primary-900 mr-3">编辑</a>
                  <a href="#" class="text-danger hover:text-red-700">删除</a>
                </td>
              </tr>
              <tr class="hover:bg-neutral-50 transition-colors">
                <td class="px-6 py-4 whitespace-nowrap">
                  <div class="flex items-center">
                    <div class="w-10 h-10 rounded-full bg-green-100 flex items-center justify-center text-green-600 font-medium">李</div>
                    <div class="ml-4">
                      <div class="text-sm font-medium text-neutral-900">李四</div>
                      <div class="text-sm text-neutral-500">lisi@example.com</div>
                    </div>
                  </div>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-neutral-600">产品部</td>
                <td class="px-6 py-4 whitespace-nowrap">
                  <span class="px-2 py-1 text-xs font-medium bg-neutral-100 text-neutral-700 rounded">普通用户</span>
                </td>
                <td class="px-6 py-4 whitespace-nowrap">
                  <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">启用</span>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-neutral-500">2024-01-20</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm">
                  <a href="#" class="text-primary-600 hover:text-primary-900 mr-3">编辑</a>
                  <a href="#" class="text-danger hover:text-red-700">删除</a>
                </td>
              </tr>
            </tbody>
          </table>
          
          <div class="px-6 py-4 border-t border-neutral-200 flex items-center justify-between">
            <div class="text-sm text-neutral-500">显示 1-2 条，共 50 条</div>
            <div class="flex items-center space-x-2">
              <button class="px-3 py-1 border border-neutral-300 rounded text-sm text-neutral-600 hover:bg-neutral-50 transition-colors">上一页</button>
              <button class="px-3 py-1 bg-primary-600 text-white rounded text-sm">1</button>
              <button class="px-3 py-1 border border-neutral-300 rounded text-sm text-neutral-600 hover:bg-neutral-50 transition-colors">2</button>
              <button class="px-3 py-1 border border-neutral-300 rounded text-sm text-neutral-600 hover:bg-neutral-50 transition-colors">3</button>
              <button class="px-3 py-1 border border-neutral-300 rounded text-sm text-neutral-600 hover:bg-neutral-50 transition-colors">下一页</button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
