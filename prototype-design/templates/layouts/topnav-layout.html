<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>顶部导航布局 - B端管理系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc',
              400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1',
              800: '#075985', 900: '#0c4a6e',
            },
            neutral: {
              50: '#fafafa', 100: '#f5f5f5', 200: '#e5e5e5', 300: '#d4d4d4',
              400: '#a3a3a3', 500: '#737373', 600: '#525252', 700: '#404040',
              800: '#262626', 900: '#171717',
            },
            success: '#10b981', warning: '#f59e0b', danger: '#ef4444', info: '#3b82f6',
          }
        }
      }
    }
  </script>
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-neutral-50 min-h-screen">
  <header class="bg-white border-b border-neutral-200 sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex">
          <div class="flex-shrink-0 flex items-center">
            <div class="w-8 h-8 bg-primary-500 rounded-lg flex items-center justify-center">
              <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
              </svg>
            </div>
            <span class="ml-3 text-lg font-semibold text-neutral-900">管理系统</span>
          </div>
          <nav class="hidden sm:ml-8 sm:flex sm:space-x-1">
            <a href="#" class="px-4 py-5 text-sm font-medium text-primary-600 border-b-2 border-primary-600">首页</a>
            <a href="#" class="px-4 py-5 text-sm font-medium text-neutral-500 hover:text-neutral-700 hover:border-b-2 hover:border-neutral-300">用户管理</a>
            <a href="#" class="px-4 py-5 text-sm font-medium text-neutral-500 hover:text-neutral-700 hover:border-b-2 hover:border-neutral-300">部门管理</a>
            <a href="#" class="px-4 py-5 text-sm font-medium text-neutral-500 hover:text-neutral-700 hover:border-b-2 hover:border-neutral-300">任务中心</a>
            <a href="#" class="px-4 py-5 text-sm font-medium text-neutral-500 hover:text-neutral-700 hover:border-b-2 hover:border-neutral-300">系统设置</a>
          </nav>
        </div>
        <div class="flex items-center space-x-4">
          <button class="p-2 text-neutral-400 hover:text-neutral-600 hover:bg-neutral-100 rounded-lg transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
          </button>
          <button class="p-2 text-neutral-400 hover:text-neutral-600 hover:bg-neutral-100 rounded-lg transition-colors relative">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
            </svg>
            <span class="absolute top-1 right-1 w-2 h-2 bg-danger rounded-full"></span>
          </button>
          <div class="w-px h-6 bg-neutral-200"></div>
          <div class="flex items-center space-x-3">
            <div class="w-8 h-8 rounded-full bg-primary-500 flex items-center justify-center text-white text-sm font-medium">A</div>
            <span class="text-sm font-medium text-neutral-700">Admin</span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
    <div class="mb-6">
      <h1 class="text-2xl font-semibold text-neutral-900">数据概览</h1>
      <p class="text-neutral-500 mt-1">查看系统运营数据统计</p>
    </div>

    <div class="grid grid-cols-4 gap-6 mb-6">
      <div class="bg-white rounded-lg shadow-sm p-6">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-neutral-500">总用户数</p>
            <p class="text-2xl font-semibold text-neutral-900 mt-1">12,345</p>
          </div>
          <div class="w-12 h-12 bg-primary-100 rounded-lg flex items-center justify-center">
            <svg class="w-6 h-6 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
          </div>
        </div>
        <div class="mt-4 flex items-center text-sm">
          <span class="text-green-500 font-medium">+12%</span>
          <span class="text-neutral-400 ml-2">较上月</span>
        </div>
      </div>

      <div class="bg-white rounded-lg shadow-sm p-6">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-neutral-500">活跃用户</p>
            <p class="text-2xl font-semibold text-neutral-900 mt-1">8,234</p>
          </div>
          <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center">
            <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
            </svg>
          </div>
        </div>
        <div class="mt-4 flex items-center text-sm">
          <span class="text-green-500 font-medium">+8%</span>
          <span class="text-neutral-400 ml-2">较上月</span>
        </div>
      </div>

      <div class="bg-white rounded-lg shadow-sm p-6">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-neutral-500">待处理任务</p>
            <p class="text-2xl font-semibold text-neutral-900 mt-1">156</p>
          </div>
          <div class="w-12 h-12 bg-warning/10 rounded-lg flex items-center justify-center">
            <svg class="w-6 h-6 text-warning" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
            </svg>
          </div>
        </div>
        <div class="mt-4 flex items-center text-sm">
          <span class="text-danger font-medium">+23%</span>
          <span class="text-neutral-400 ml-2">较上月</span>
        </div>
      </div>

      <div class="bg-white rounded-lg shadow-sm p-6">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm text-neutral-500">系统运行天数</p>
            <p class="text-2xl font-semibold text-neutral-900 mt-1">365</p>
          </div>
          <div class="w-12 h-12 bg-info/10 rounded-lg flex items-center justify-center">
            <svg class="w-6 h-6 text-info" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </div>
        </div>
        <div class="mt-4 flex items-center text-sm">
          <span class="text-green-500 font-medium">稳定运行</span>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-3 gap-6">
      <div class="col-span-2 bg-white rounded-lg shadow-sm p-6">
        <h3 class="text-lg font-medium text-neutral-900 mb-4">最近活动</h3>
        <div class="space-y-4">
          <div class="flex items-start">
            <div class="w-8 h-8 rounded-full bg-primary-100 flex items-center justify-center text-primary-600 text-sm font-medium flex-shrink-0">张</div>
            <div class="ml-3 flex-1">
              <p class="text-sm text-neutral-900"><span class="font-medium">张三</span> 创建了新用户 <span class="text-primary-600">李四</span></p>
              <p class="text-xs text-neutral-500 mt-1">2 分钟前</p>
            </div>
          </div>
          <div class="flex items-start">
            <div class="w-8 h-8 rounded-full bg-green-100 flex items-center justify-center text-green-600 text-sm font-medium flex-shrink-0">王</div>
            <div class="ml-3 flex-1">
              <p class="text-sm text-neutral-900"><span class="font-medium">王五</span> 完成了任务 <span class="text-primary-600">系统升级</span></p>
              <p class="text-xs text-neutral-500 mt-1">15 分钟前</p>
            </div>
          </div>
          <div class="flex items-start">
            <div class="w-8 h-8 rounded-full bg-warning/10 flex items-center justify-center text-warning text-sm font-medium flex-shrink-0">赵</div>
            <div class="ml-3 flex-1">
              <p class="text-sm text-neutral-900"><span class="font-medium">赵六</span> 提交了审批申请</p>
              <p class="text-xs text-neutral-500 mt-1">1 小时前</p>
            </div>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-lg shadow-sm p-6">
        <h3 class="text-lg font-medium text-neutral-900 mb-4">快捷操作</h3>
        <div class="space-y-3">
          <button class="w-full px-4 py-3 bg-primary-50 text-primary-700 rounded-lg text-sm font-medium hover:bg-primary-100 transition-colors flex items-center">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            新增用户
          </button>
          <button class="w-full px-4 py-3 bg-neutral-50 text-neutral-700 rounded-lg text-sm font-medium hover:bg-neutral-100 transition-colors flex items-center">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            创建任务
          </button>
          <button class="w-full px-4 py-3 bg-neutral-50 text-neutral-700 rounded-lg text-sm font-medium hover:bg-neutral-100 transition-colors flex items-center">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            导出报表
          </button>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
