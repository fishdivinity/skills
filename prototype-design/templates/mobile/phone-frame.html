<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>移动端原型 - 手机壳模板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc',
              400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1',
              800: '#075985', 900: '#0c4a6e',
            },
            neutral: {
              50: '#fafafa', 100: '#f5f5f5', 200: '#e5e5e5', 300: '#d4d4d4',
              400: '#a3a3a3', 500: '#737373', 600: '#525252', 700: '#404040',
              800: '#262626', 900: '#171717',
            },
            success: '#10b981', warning: '#f59e0b', danger: '#ef4444', info: '#3b82f6',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .phone-frame {
      width: 375px;
      height: 812px;
      background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
      border-radius: 55px;
      padding: 12px;
      box-shadow: 
        0 0 0 1px #333,
        0 0 0 4px #1a1a1a,
        0 0 0 5px #333,
        0 30px 60px -15px rgba(0, 0, 0, 0.6),
        inset 0 0 10px rgba(255,255,255,0.05);
    }
    .phone-screen {
      width: 100%;
      height: 100%;
      background: white;
      border-radius: 44px;
      overflow: hidden;
      position: relative;
    }
    .phone-notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 160px;
      height: 34px;
      background: #1a1a1a;
      border-radius: 0 0 24px 24px;
      z-index: 10;
    }
    .phone-notch::before {
      content: '';
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 6px;
      background: #333;
      border-radius: 3px;
    }
    .phone-notch::after {
      content: '';
      position: absolute;
      top: 10px;
      right: 20px;
      width: 10px;
      height: 10px;
      background: #333;
      border-radius: 50%;
    }
    .phone-content {
      height: 100%;
      overflow-y: auto;
      padding-top: 50px;
      padding-bottom: 90px;
      scrollbar-width: none;
    }
    .phone-content::-webkit-scrollbar {
      display: none;
    }
    .phone-status-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 28px 8px;
      font-size: 14px;
      font-weight: 600;
      z-index: 5;
      background: linear-gradient(to bottom, white 70%, transparent);
    }
    .phone-home-indicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 5px;
      background: #333;
      border-radius: 3px;
      z-index: 10;
    }
    .phone-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-top: 1px solid #f0f0f0;
      padding-bottom: 28px;
      z-index: 10;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-neutral-200 to-neutral-300 min-h-screen flex items-center justify-center p-8">
  <div class="phone-frame">
    <div class="phone-screen">
      <div class="phone-notch"></div>
      
      <div class="phone-status-bar">
        <span>9:41</span>
        <div class="flex items-center space-x-1">
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 3C6.95 3 3 6.95 3 12s3.95 9 9 9c.65 0 1.29-.07 1.9-.19l.21-.04c.38-.08.74-.19 1.09-.32l.16-.06c.35-.13.68-.29 1-.47l.11-.06c.32-.18.62-.39.91-.62l.07-.05c.29-.23.56-.48.81-.75l.02-.02c.25-.27.48-.55.69-.85l.01-.02c.21-.3.4-.61.56-.94l.01-.02c.16-.33.3-.67.41-1.02l.01-.03c.11-.35.2-.71.26-1.08l.01-.05c.06-.37.09-.75.09-1.13 0-4.42-3.58-8-8-8zm0 14.5c-3.58 0-6.5-2.92-6.5-6.5S8.42 4.5 12 4.5s6.5 2.92 6.5 6.5-2.92 6.5-6.5 6.5z"/>
          </svg>
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
            <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/>
          </svg>
          <div class="flex items-center">
            <svg class="w-6 h-3" fill="currentColor" viewBox="0 0 24 12">
              <rect x="0" y="1" width="20" height="10" rx="2" stroke="currentColor" stroke-width="1" fill="none"/>
              <rect x="2" y="3" width="14" height="6" rx="1" fill="currentColor"/>
              <rect x="21" y="4" width="2" height="4" rx="0.5" fill="currentColor"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="phone-content bg-neutral-50">
        <div class="px-4 py-4 bg-white">
          <div class="flex items-center justify-between mb-4">
            <div>
              <p class="text-sm text-neutral-500">早上好</p>
              <h1 class="text-xl font-semibold text-neutral-900">张三</h1>
            </div>
            <div class="w-10 h-10 rounded-full bg-primary-500 flex items-center justify-center text-white font-medium">
              张
            </div>
          </div>
          
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="w-5 h-5 text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
              </svg>
            </div>
            <input type="text" placeholder="搜索..." class="w-full pl-10 pr-4 py-2.5 bg-neutral-100 rounded-xl text-sm focus:outline-none">
          </div>
        </div>

        <div class="px-4 py-4">
          <div class="grid grid-cols-4 gap-4 mb-6">
            <div class="flex flex-col items-center">
              <div class="w-12 h-12 bg-primary-100 rounded-2xl flex items-center justify-center mb-2">
                <svg class="w-6 h-6 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                </svg>
              </div>
              <span class="text-xs text-neutral-600">审批</span>
            </div>
            <div class="flex flex-col items-center">
              <div class="w-12 h-12 bg-green-100 rounded-2xl flex items-center justify-center mb-2">
                <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
              </div>
              <span class="text-xs text-neutral-600">报表</span>
            </div>
            <div class="flex flex-col items-center">
              <div class="w-12 h-12 bg-warning/10 rounded-2xl flex items-center justify-center mb-2">
                <svg class="w-6 h-6 text-warning" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
              </div>
              <span class="text-xs text-neutral-600">日程</span>
            </div>
            <div class="flex flex-col items-center">
              <div class="w-12 h-12 bg-purple-100 rounded-2xl flex items-center justify-center mb-2">
                <svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                </svg>
              </div>
              <span class="text-xs text-neutral-600">通讯录</span>
            </div>
          </div>

          <div class="bg-white rounded-2xl p-4 mb-4">
            <div class="flex items-center justify-between mb-3">
              <h3 class="font-medium text-neutral-900">待办事项</h3>
              <span class="text-xs text-primary-600">查看全部</span>
            </div>
            <div class="space-y-3">
              <div class="flex items-center p-3 bg-neutral-50 rounded-xl">
                <div class="w-10 h-10 rounded-xl bg-primary-100 flex items-center justify-center text-primary-600 font-medium text-sm">审</div>
                <div class="ml-3 flex-1">
                  <p class="text-sm font-medium text-neutral-900">采购申请审批</p>
                  <p class="text-xs text-neutral-500">李四 · 今天 14:00</p>
                </div>
                <span class="px-2 py-1 text-xs bg-warning/10 text-warning rounded-full">待处理</span>
              </div>
              <div class="flex items-center p-3 bg-neutral-50 rounded-xl">
                <div class="w-10 h-10 rounded-xl bg-green-100 flex items-center justify-center text-green-600 font-medium text-sm">会</div>
                <div class="ml-3 flex-1">
                  <p class="text-sm font-medium text-neutral-900">项目进度会议</p>
                  <p class="text-xs text-neutral-500">明天 10:00</p>
                </div>
                <span class="px-2 py-1 text-xs bg-primary-100 text-primary-600 rounded-full">已安排</span>
              </div>
            </div>
          </div>

          <div class="bg-white rounded-2xl p-4">
            <div class="flex items-center justify-between mb-3">
              <h3 class="font-medium text-neutral-900">最近动态</h3>
              <span class="text-xs text-primary-600">查看全部</span>
            </div>
            <div class="space-y-4">
              <div class="flex items-start">
                <div class="w-8 h-8 rounded-full bg-primary-100 flex items-center justify-center text-primary-600 text-xs font-medium">王</div>
                <div class="ml-3 flex-1">
                  <p class="text-sm text-neutral-900"><span class="font-medium">王五</span> 提交了请假申请</p>
                  <p class="text-xs text-neutral-500 mt-0.5">10 分钟前</p>
                </div>
              </div>
              <div class="flex items-start">
                <div class="w-8 h-8 rounded-full bg-green-100 flex items-center justify-center text-green-600 text-xs font-medium">赵</div>
                <div class="ml-3 flex-1">
                  <p class="text-sm text-neutral-900"><span class="font-medium">赵六</span> 完成了任务 <span class="text-primary-600">系统升级</span></p>
                  <p class="text-xs text-neutral-500 mt-0.5">1 小时前</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="phone-nav">
        <div class="flex justify-around py-2">
          <a href="#" class="flex flex-col items-center py-1 text-primary-600">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
              <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
            <span class="text-xs mt-1">首页</span>
          </a>
          <a href="#" class="flex flex-col items-center py-1 text-neutral-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
            </svg>
            <span class="text-xs mt-1">消息</span>
          </a>
          <a href="#" class="flex flex-col items-center py-1 text-neutral-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>
            <span class="text-xs mt-1">通讯录</span>
          </a>
          <a href="#" class="flex flex-col items-center py-1 text-neutral-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <span class="text-xs mt-1">我的</span>
          </a>
        </div>
      </div>

      <div class="phone-home-indicator"></div>
    </div>
  </div>
</body>
</html>
