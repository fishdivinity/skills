<!-- 表单组件 -->
<form class="form">
  <div class="form__group">
    <label class="form__label" for="name">姓名</label>
    <input class="form__input" type="text" id="name" name="name" required>
  </div>
  <div class="form__group">
    <label class="form__label" for="email">邮箱</label>
    <input class="form__input" type="email" id="email" name="email" required>
  </div>
  <div class="form__group">
    <label class="form__label" for="password">密码</label>
    <input class="form__input" type="password" id="password" name="password" required>
  </div>
  <div class="form__group">
    <label class="form__label" for="gender">性别</label>
    <select class="form__select" id="gender" name="gender">
      <option value="male">男</option>
      <option value="female">女</option>
      <option value="other">其他</option>
    </select>
  </div>
  <div class="form__group">
    <label class="form__label">爱好</label>
    <div class="form__checkbox-group">
      <label class="form__checkbox-label">
        <input type="checkbox" name="hobbies" value="reading"> 阅读
      </label>
      <label class="form__checkbox-label">
        <input type="checkbox" name="hobbies" value="sports"> 运动
      </label>
      <label class="form__checkbox-label">
        <input type="checkbox" name="hobbies" value="music"> 音乐
      </label>
    </div>
  </div>
  <div class="form__group">
    <label class="form__label">同意条款</label>
    <label class="form__checkbox-label">
      <input type="checkbox" name="terms" required> 我同意用户条款和隐私政策
    </label>
  </div>
  <div class="form__group">
    <button class="btn btn--primary" type="submit">提交</button>
    <button class="btn btn--secondary" type="reset">重置</button>
  </div>
</form>
